<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Stránka neexistuje</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #111;
      text-align: center;
    }

    .error-page {
      padding: 30px;
    }

    .error-page h1 {
      font-size: 140px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 20px;
    }

    .error-page p {
      font-size: 28px;
      margin-bottom: 30px;
    }

    .error-page a {
      display: inline-block;
      padding: 12px 24px;
      background: #111;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-size: 16px;
      transition: 0.2s;
    }

    .error-page a:hover {
      background: #333;
    }

    @media (max-width: 600px) {
      .error-page h1 {
        font-size: 90px;
      }

      .error-page p {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>

  <main class="error-page">
    <h1>404</h1>
    <p>Stránka neexistuje.</p>
    <a href="/">Zpět na hlavní stránku</a>
  </main>

</body>
</html>
