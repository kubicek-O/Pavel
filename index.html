<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Popcat webovka</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      user-select: none;
    }

    img {
      width: 300px;
      cursor: pointer;
      transition: 0.08s;
      border-radius: 20px;
    }

    .pop {
      transform: scale(1.15);
    }

    h1 {
      font-size: 60px;
      margin: 0 0 30px 0;
    }
  </style>
</head>
<body>

  <div>
    <h1 id="counter">0</h1>
    <img id="photo" src="komrska.jpg" alt="Pop fotka">
  </div>

  <script>
    let count = 0;

    const photo = document.getElementById("photo");
    const counter = document.getElementById("counter");

    photo.addEventListener("mousedown", function() {
      count++;
      counter.textContent = count;
      photo.classList.add("pop");
    });

    photo.addEventListener("mouseup", function() {
      photo.classList.remove("pop");
    });

    photo.addEventListener("mouseleave", function() {
      photo.classList.remove("pop");
    });

    photo.addEventListener("touchstart", function() {
      count++;
      counter.textContent = count;
      photo.classList.add("pop");
    });

    photo.addEventListener("touchend", function() {
      photo.classList.remove("pop");
    });
  </script>

</body>
</html>
